name: Test
on:
  push:
    branches:
      - main
      - develop
      - "feature/week_of_refactor"
  pull_request:
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-suffix: "uv_cache"
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest tests
