name: Lint
on:
  push:
    branches:
      - main
      - develop
      - "feature/week_of_refactor"
  pull_request:
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format full"
